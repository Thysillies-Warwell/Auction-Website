<!DOCTYPE html>
<html>
<head>
  <title>Item Sheet</title>
  <link href="item.css" rel="stylesheet" />
  <meta http-equiv="refresh" content="1">
</head>

<body>

	<div id="header">

		<h1><a href="homepage.html">Auction-ettes</a></h1>

		<button class="advert">Find a New Item!
			<h3>?</h3>
			Click Me To Start Exploring!
		</button>

		<h2><a href="login.html">Login</a></h2>
    </div>



    <main>

        <div id="item_name">
            <h1>insert item name here</h1>

            <div id="item_bid">
                <p>Place Bid (bid needs to be higher than current highest bid)</p>
                <input type="text" name="password" size="5" maxlength="100" placeholder="Enter Bid"/>
            </div>
        </div>

        

        <div id="left_half">

            <div id="item_description">
                <p>Insert description of item here</p>
            </div>

            <div id="right_half">

                <div id="item_image">
                    <p>Insert image of item here</p>
                    
                </div>

                <div id="item_properties">
                    <p>Insert owner of item here</p>
                    <p>Insert price of item here</p>
                    <p>Insert listed date of item here</p>
                    <p>Insert highest bid of item here</p>

                </div>

            </div>

        </div>

	</main>

</body>
</html>
